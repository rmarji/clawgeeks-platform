# Ruff configuration for ClawGeeks Platform
# https://docs.astral.sh/ruff/

# Target Python 3.11
target-version = "py311"

# Line length matches Black
line-length = 88

# Exclude paths
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "alembic/versions",
    "build",
    "dist",
    "node_modules",
    "sdk",  # Generated code
]

[lint]
# Enable rules
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented code)
    "RUF",    # Ruff-specific rules
]

# Ignore rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function-call-in-default-argument (FastAPI Depends)
    "B904",   # raise-without-from-inside-except
    "ARG001", # unused-function-argument (common in tests)
    "ARG002", # unused-method-argument (common in tests)
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[lint.isort]
known-first-party = ["provisioning"]
force-single-line = false
combine-as-imports = true

[lint.per-file-ignores]
"tests/*" = ["ARG", "S101"]  # Allow assert and unused args in tests
"alembic/*" = ["ERA001"]      # Allow commented code in migrations
