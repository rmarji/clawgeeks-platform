# ClawGeeks Platform - Full Stack
# Run: docker compose up -d
# Dashboard: http://localhost:3000
# API: http://localhost:8000
# API Docs: http://localhost:8000/docs

services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: clawgeeks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawgeeks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-clawgeeks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawgeeks}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawgeeks

  # =============================================================================
  # FastAPI Backend
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawgeeks-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clawgeeks}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-clawgeeks}
      
      # Stripe (required for billing)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-}
      
      # Coolify (required for provisioning)
      COOLIFY_API_URL: ${COOLIFY_API_URL:-}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN:-}
      
      # App config
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - clawgeeks

  # =============================================================================
  # Next.js Dashboard
  # =============================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: clawgeeks-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # API URL (internal to Docker network)
      NEXT_PUBLIC_API_URL: http://api:8000
      # For SSR/server-side calls
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    networks:
      - clawgeeks

  # =============================================================================
  # Database Migrations (run once)
  # =============================================================================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawgeeks-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clawgeeks}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-clawgeeks}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks:
      - clawgeeks
    profiles:
      - migrate

networks:
  clawgeeks:
    driver: bridge

volumes:
  postgres_data:
